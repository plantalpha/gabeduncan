<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabe Duncan</title>
  <link href="https://fonts.cdnfonts.com/css/spongebob-font-condensed" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/tilt-warp" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="scene">
  <!-- Background -->
  <div id="bgA" class="bg-layer visible"></div>
  <div id="bgB" class="bg-layer"></div>
  <div class="bg-dim" aria-hidden="true"></div>

  <header>
    <h1><a href="/">Gabe Duncan</a></h1>
    <nav>
      <!-- Example nav links (optional) -->
      <!-- <a href="/checklist/2026/">Checklist</a> -->
      <!-- <a href="/videos/">Videos</a> -->
    </nav>
  </header>

  <!-- ENTER BOX -->
  <div id="enter-box">
    <button id="enter-btn">ENTER</button>
    <button id="console-btn">☺</button>
  </div>

  <!-- COMMAND CONSOLE -->
  <div id="console" hidden>
    <div id="console-header">
      <span>Console</span>
      <button id="console-close">✕</button>
    </div>

    <input id="console-input" autocomplete="off" />
    <div class="console-buttons">
      <button id="console-run">Enter</button>
      <button id="console-clear">Clear</button>
    </div>
  </div>

   <footer>
    © <span id="year"></span> Gabe Duncan
  </footer>
</div>
  <script src="app.js"></script>
</body>
</html>
